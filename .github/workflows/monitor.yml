name: Monitor Turismo Semanal

on:
  schedule:
    - cron: '0 11 * * 1'  # Cada lunes 8am Chile
  workflow_dispatch:        # Permite ejecutar manualmente

jobs:
  ejecutar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic feedparser python-docx

      - name: Ejecutar monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor_turismo.py

      - name: Subir archivo Word
        uses: actions/upload-artifact@v4
        with:
          name: monitor-turismo-semanal
          path: Monitor_Turismo_*.docx
          retention-days: 30
